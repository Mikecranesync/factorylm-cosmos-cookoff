# Factory I/O Bridge Configuration
# Connects Factory I/O (or real PLC) to FactoryLM Matrix API via Modbus TCP.

factoryio:
  # Modbus TCP connection
  host: "127.0.0.1"
  port: 502

  # Matrix API endpoint
  matrix_url: "http://localhost:8000"

  # Poll interval in milliseconds (200ms = 5 Hz, 100ms = 10 Hz)
  interval_ms: 200

  # Incident source: "sim" uses built-in PLC simulator, "factoryio" uses Modbus
  # This controls which data source the bridge uses when started without --sim flag.
  incident_source: "factoryio"

  # Recommended Factory I/O scene: "Sorting by Height" or "From A to B"
  # These scenes have conveyors, photoeye sensors, and jams you can trigger.
  scene: "Sorting by Height"

  # Tag map: Modbus addresses → FactoryLM tag names
  # Adjust these to match your Factory I/O Modbus driver configuration.
  #
  # Factory I/O Modbus setup:
  #   1. Open Factory I/O → File → Drivers → Modbus TCP/IP Server
  #   2. Click "Configuration" to map I/O points to Modbus addresses
  #   3. Match the addresses below to your mapping
  #
  # Default addresses match the Allen-Bradley Micro 820 convention
  # used throughout this repo (see services/plc-modbus/CLAUDE.md).

  # Canonical Modbus address map — matches CLAUDE.md and CONVEYOR_OF_DESTINY.md
  coils:
    0: Conveyor             # Belt motor command
    1: Emitter              # Item spawner
    2: SensorStart          # Entry photoeye
    3: SensorEnd            # Exit photoeye
    4: RunCommand           # Remote API trigger
    7: _IO_EM_DI_00         # 3-pos switch CENTER
    8: _IO_EM_DI_01         # E-stop NO contact
    9: _IO_EM_DI_02         # E-stop NC contact
    10: _IO_EM_DI_03        # 3-pos switch RIGHT
    11: _IO_EM_DI_04        # Green pushbutton
    15: _IO_EM_DO_00        # Indicator LED / VFD FWD
    16: _IO_EM_DO_01        # E-stop LED / VFD REV
    17: _IO_EM_DO_03        # Aux output

  registers:
    100: item_count         # Items reached SensorEnd
    101: motor_speed        # Speed 0-100%
    102: motor_current      # Motor current (raw ÷ 10 = Amps)
    103: temperature        # Temperature (raw ÷ 10 = °C)
    104: pressure           # Pressure (PSI)
    105: error_code         # 0=OK, 1=Overload, 2=Overheat, 3=Jam, 4=Sensor, 5=Comms

  # Scale factors for registers (applied automatically by the bridge)
  # Derived: fault_alarm = coil[8] AND NOT coil[9]  (E-stop dual-contact validation)
  scale:
    motor_current: 0.1     # raw * 0.1 = Amps (register 102)
    temperature: 0.1       # raw * 0.1 = °C (register 103)
