name: Pi Factory CI

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests (sim mode)
        env:
          FACTORYLM_NET_MODE: sim
        run: pytest tests/ -v --tb=short

      - name: Verify API endpoints respond
        env:
          FACTORYLM_NET_MODE: sim
        run: |
          python -m uvicorn net.api.main:app --host 127.0.0.1 --port 9000 &
          sleep 3

          PASS=0; FAIL=0

          check() {
            local label="$1"; local cmd="$2"
            if eval "$cmd" > /dev/null 2>&1; then
              echo "  PASS  $label"; PASS=$((PASS+1))
            else
              echo "  FAIL  $label"; FAIL=$((FAIL+1))
            fi
          }

          # Root redirect
          check "GET /" \
            "curl -s -o /dev/null -w '%{http_code}' -L http://127.0.0.1:9000/ | grep -q 200"

          # Wizard HTML
          check "GET /setup" \
            "curl -sf http://127.0.0.1:9000/setup | grep -q 'Pi Factory'"

          # Status (sim mode)
          check "GET /api/status" \
            "curl -sf http://127.0.0.1:9000/api/status | python -c \"import sys,json; d=json.load(sys.stdin); assert d['mode']=='sim'\""

          # PLC scan (sim returns fake devices)
          check "GET /api/plc/scan" \
            "curl -sf http://127.0.0.1:9000/api/plc/scan | python -c \"import sys,json; d=json.load(sys.stdin); assert len(d['devices'])>0\""

          # Tag extraction
          check "POST /api/plc/extract" \
            "curl -sf -X POST http://127.0.0.1:9000/api/plc/extract -H 'Content-Type: application/json' -d '{\"ip\":\"192.168.1.100\"}' | python -c \"import sys,json; d=json.load(sys.stdin); assert 'tags' in d\""

          # WiFi scan — 200 (real Pi) or 503 (no WiFi hw) are both OK
          check "GET /api/wifi/scan" \
            "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:9000/api/wifi/scan | grep -qE '200|503'"

          # Gateway ID
          check "GET /api/gateway/id" \
            "curl -sf http://127.0.0.1:9000/api/gateway/id | python -c \"import sys,json; d=json.load(sys.stdin); assert d['id'].startswith('flm-')\""

          kill %1 2>/dev/null || true

          echo ""
          echo "Results: $PASS passed, $FAIL failed"
          [ "$FAIL" -eq 0 ] || exit 1

      - name: Lint check (syntax)
        run: |
          python -m py_compile net/api/main.py
          python -m py_compile services/matrix/app.py
          python -m py_compile net/services/poller.py
          python -m py_compile net/diagnosis/conveyor_faults.py

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check shell script syntax
        run: |
          bash -n pi-factory/setup.sh
          bash -n pi-factory/uninstall.sh
          bash -n pi-factory/first_boot.sh
          echo "All shell scripts pass syntax check."
